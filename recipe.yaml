---
# GREENGRASS deployment: the device bus is the Nucleus IPC pubsub (PRIMARY), the site broker is
# reached over MQTT (SITE, from `component.instances[].siteBroker` below). The relay shares the
# runtime's IPC provider, so this recipe needs NO `messaging` section — the transport is IPC.
# The binary must be built with the `greengrass` cargo feature (Linux-only IPC C-FFI). The
# site-broker half of a deployment is `deploy/site-broker/`; a HOST/standalone run is documented
# in README "How it connects" and docs/how-to-guides.md.
# No `component.name` key here: the canonical edgecommons config schema allows only
# `global`/`instances` under `component` — the component's full name is supplied by the runtime
# builder, never by config (see README "Configuration").
RecipeFormatVersion: "2020-01-25"
ComponentName: "com.mbreissi.edgecommons.UnsBridge"
ComponentVersion: "1.0.0"
ComponentDescription: "UNS bridge: one per device bus — an envelope-aware relay between the device-local bus and the site UNS broker (uplinks the six UNS classes topic-verbatim, downlinks own-device commands, hop-tag loop protection, derived site-connection LWT)."
ComponentPublisher: "Marc Breissinger"
ComponentConfiguration:
  DefaultConfiguration:
    ComponentConfig:
      logging:
        level: "INFO"
      heartbeat:
        enabled: true
        intervalSecs: 5
      metricEmission:
        target: "messaging"
      component:
        instances:
          - id: "site"
            siteBroker:
              host: "site-broker.example"
              port: 8883
              clientId: "uns-bridge-{ThingName}"
              credentials:
                certPath: "/greengrass/v2/work/{ComponentFullName}/certs/client.pem"
                keyPath: "/greengrass/v2/work/{ComponentFullName}/certs/client.key"
                caPath: "/greengrass/v2/work/{ComponentFullName}/certs/ca.pem"
            uplink:
              classes:
                app:
                  enabled: false
            reply:
              ttlSecs: 60
              maxPending: 1024
            maxHops: 4
            queue:
              data: 512
              default: 64
    # IPC pubsub authorization for the device bus (the relay's PRIMARY). The bridge must SUBSCRIBE
    # and PUBLISH across the full local UNS surface: every uplink class wildcard
    # (ecv1/+/+/+/{state,cfg,evt,metric,data,log}[/#]) plus its own emitted state/cfg/metric, the
    # own-device cmd downlink (ecv1/{thing}/+/+/cmd/#), the reply-proxy reply topics
    # (edgecommons/reply-*, non-ecv1), and the reconnect rehydration broadcasts
    # (ecv1/{thing}/_bcast/cmd/republish-*). Granting "*" (as the reference adapters do) covers all
    # of these local IPC topics; the durable per-device boundary is enforced at the SITE broker ACL,
    # not here. No mqttproxy/TokenExchangeService: the site link is a plain external MQTT socket
    # (its own TLS certs), not Greengrass-brokered IoT Core.
    accessControl:
      aws.greengrass.ipc.pubsub:
        "com.mbreissi.edgecommons.UnsBridge:pubsub:1":
          policyDescription: Allows the bridge to subscribe and publish all local UNS + reply-proxy topics on IPC.
          operations:
            - "aws.greengrass#PublishToTopic"
            - "aws.greengrass#SubscribeToTopic"
          resources:
            - "*"
Manifests:
  - Platform:
      os: linux
    Artifacts:
      - URI: "s3://BUCKET_NAME/COMPONENT_NAME/COMPONENT_VERSION/uns-bridge"
    Lifecycle:
      Install:
        Script: "chmod +x {artifacts:path}/uns-bridge"
      Run:
        # Standard edgecommons CLI grammar: --platform/--transport select the runtime axes, and
        # -c/--config takes a SOURCE keyword first (GG_CONFIG reads this recipe's ComponentConfig).
        # On GREENGRASS the device bus is IPC (config-free); the site broker comes from GG_CONFIG.
        Script: "{artifacts:path}/uns-bridge --platform GREENGRASS --transport IPC -c GG_CONFIG -t {iot:thingName}"
