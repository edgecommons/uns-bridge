name: ci

on:
  push:
    paths-ignore: ['**.md', 'docs/**']
  pull_request:
    paths-ignore: ['**.md', 'docs/**']
  workflow_dispatch:

jobs:
  ci:
    # Reusable component CI from the org defaults repo (build + test + clippy -D warnings).
    # `edgecommons/edgecommons` is public, so cargo fetches the git dependency anonymously and no
    # token is required; `secrets: inherit` is retained but passes nothing CI now depends on.
    permissions:
      contents: read
    uses: edgecommons/.github/.github/workflows/component-ci.yml@main
    with:
      language: RUST
      rust-features: "standalone"
    secrets: inherit

  coverage:
    # The 90% line-coverage gate (baseline item WS-4 / issue #3 P0-2), actually RUN here (the
    # reusable component-ci only does build/test/clippy). Excluded from the denominator: ONLY
    # `src/main.rs`, the thin live-MQTT-driver wiring seam (runtime bootstrap, the real
    # `MqttProvider::connect`/`connect_with_last_will` calls, the site retry loop) — it has no
    # unit tests of its own and is validated instead by the gated dual-EMQX e2e
    # (`tests/e2e_dual_broker.rs`, `UNS_BRIDGE_E2E=1`). Every other module (`config.rs`, `io.rs`,
    # `observability.rs`, `policy.rs`, `relay.rs`, `reply.rs`) is pure logic exercised by the
    # in-crate unit tests against the in-memory fake `MessagingProvider` and stays in the
    # denominator at ~92-100% each. Do not widen this exclusion or lower the threshold to pass —
    # add tests instead.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --component llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Coverage gate (90% lines; live MQTT-driver seam excluded)
        env:
          # edgecommons/edgecommons is public; cargo fetches the git dependency anonymously.
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: >
          cargo llvm-cov --features standalone
          --ignore-filename-regex 'main\.rs'
          --fail-under-lines 90
