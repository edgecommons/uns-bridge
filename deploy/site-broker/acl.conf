%% uns-bridge site-broker ACL — the durable enforcement boundary (D-B13/D-B4, DESIGN-uns-bridge.md
%% §4.4 / §5.4 / §7.5 pt 3).
%%
%% WHY THIS FILE MATTERS: the bridge relays other components' state/cfg/evt/metric/data/log
%% VERBATIM at the raw MessagingProvider level (no in-process reserved-class guard is in that
%% path, by design — §1.3). Nothing in the bridge's own code stops it — or a misconfigured /
%% compromised bridge — from publishing outside its own device's subtree. This file is what does.
%% If you deploy the bridge against a site broker WITHOUT an ACL, there is no boundary at all.
%%
%% IDENTITY MODEL: EMQX authenticates each connection over mutual TLS (see ../TLS.md) and maps the
%% client certificate's Common Name to the MQTT username (`mqtt.peer_cert_as_username = cn`, set in
%% docker-compose.yml). So for a bridge whose site-broker client cert has CN=gw-01, EMQX sees
%% username="gw-01" for every publish/subscribe it evaluates below. There is deliberately no
%% separate per-device account to provision — the cert IS the identity, and CN naming is the only
%% thing an operator manages per device (§4.4: "usernames from mTLS cert CN").
%%
%% EVALUATION: EMQX walks these rules top-to-bottom and stops at the first match (who + action +
%% topic). The file ends in `{deny, all}.` so nothing reaches the broker's global `no_match`
%% default — an unauthenticated (anonymous/plaintext, no cert) connection matches no `{username,
%% ...}` rule and no `${username}`-templated topic (the placeholder resolves to an empty string,
%% which cannot match a real "ecv1/<device>/..." topic), so it falls through to the trailing deny.
%% This is intentional: the plaintext dev listener (docker-compose.yml, :1884) is left enabled for
%% quick local smoke-testing of the relay LOGIC, but it is NOT the enforcement path — publishes
%% from it are denied here SILENTLY (EMQX's default `deny_action=ignore` still returns a normal
%% PUBACK; a denied SUBSCRIBE, by contrast, comes back as a visible SUBACK failure code — verified
%% against a real broker while building this recipe). See ../README.md "Two ways to run this
%% locally" for what that means in practice. Only the mTLS listener (:8884) is a legitimate
%% site-broker connection.

%% =====================================================================================
%% WORKED EXAMPLE — one concrete device, "gw-01"
%% =====================================================================================
%% A bridge connects with a client cert CN=gw-01 (so username="gw-01", per mqtt.peer_cert_as_username
%% above) and client id "uns-bridge-gw-01" (see ../../test-configs/config.json's siteBroker.clientId
%% convention). The FLEET TEMPLATE rules below are what actually authorize it — this block is NOT a
%% second, redundant set of active rules; it exists purely so the boundary is auditable without
%% mentally substituting the placeholder. For username="gw-01" the template rules below expand to
%% exactly:
%%
%%   allow   publish    ecv1/gw-01/#                         (its own device subtree, every class
%%                                                             the uplink policy — §2.5 — permits:
%%                                                             ecv1/gw-01/uns-bridge/main/state, …)
%%   allow   publish    ggcommons/+                           (reply back-haul, §2.4 — bridge-minted
%%                                                             topics are one level: "reply-<uuid>")
%%   allow   subscribe  ecv1/gw-01/+/+/cmd/#                   (downlink, pinned to gw-01 only — a
%%                                                             `_bcast` command matches the first `+`)
%%   allow   subscribe  ggcommons/+                            (defensive; the bridge subscribes
%%                                                             per-request reply topics explicitly,
%%                                                             this just means the broker wouldn't
%%                                                             itself block a stray subscribe)
%%   deny    *          anything else                          (e.g. ecv1/gw-02/#, ecv1/+/#, $SYS/#)
%%
%% If you would rather pin devices explicitly (no reliance on cert-CN-as-username, e.g. you
%% terminate TLS at a proxy that can't forward the client cert), replace the FLEET TEMPLATE section
%% below with one literal block per device instead — this is what that block looks like for gw-01,
%% commented out so it does not double up with the template's own gw-01 grant:
%%
%% {allow, {username, "gw-01"}, publish,   ["ecv1/gw-01/#", "ggcommons/+"]}.
%% {allow, {username, "gw-01"}, subscribe, ["ecv1/gw-01/+/+/cmd/#", "ggcommons/+"]}.
%%
%% Per-device blocks like this do not scale past a handful of gateways (one edit per device, every
%% deploy) — the FLEET TEMPLATE below is the recommended default for a real site.

%% =====================================================================================
%% FLEET TEMPLATE — every device bridge, one rule pair (uses the `${username}` placeholder,
%% substituted by EMQX per-connection at evaluation time — see the EMQX ACL-file docs' topic-
%% placeholder support). `who = all` is correct here: the placeholder, not the who-clause, is what
%% scopes each client to its own subtree.
%% =====================================================================================
{allow, all, publish,   ["ecv1/${username}/#", "ggcommons/+"]}.
{allow, all, subscribe, ["ecv1/${username}/+/+/cmd/#", "ggcommons/+"]}.

%% =====================================================================================
%% SITE CONSUMERS — historian / MES bridge / edge console. Not device bridges: they see the WHOLE
%% site subtree (every device), and may only ever publish commands (never state/cfg/evt/metric/data/
%% log — those are library/bridge-owned classes). Provision consumer certs with a CN prefixed
%% "consumer-" (e.g. CN=consumer-console, CN=consumer-historian) so they match this regex who-spec
%% instead of a device's own rule above. `ecv1/+/_bcast/main/cmd/#` is already covered by the
%% broader `ecv1/+/+/+/cmd/#` grant on the line below (the `+` in the component position also
%% matches `_bcast`) — it is listed explicitly anyway for readability at the call site.
%% =====================================================================================
{allow, {username, {re, "^consumer-"}}, subscribe, ["ecv1/#", "ggcommons/+"]}.
{allow, {username, {re, "^consumer-"}}, publish,   ["ecv1/+/+/+/cmd/#", "ecv1/+/_bcast/main/cmd/#", "ggcommons/+"]}.

%% =====================================================================================
%% DEFAULT DENY — the catch-all. Keep this LAST; EMQX stops at the first matching rule, so nothing
%% below it is ever reached, and nothing above it should ever be deleted "to simplify" without
%% re-deriving the boundary from DESIGN-uns-bridge.md §4.4/§5.4.
%% =====================================================================================
{deny, all}.
